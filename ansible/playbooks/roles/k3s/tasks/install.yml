---
- name: Install curl
  apt:
    name: curl
    state: present

- name: Install K3s
  shell: |
    curl -sfL {{ k3s_install_url }} | INSTALL_K3S_EXEC="--write-kubeconfig-mode {{ k3s_kubeconfig_mode }} --disable=traefik" sh -s -
  args:
    creates: /usr/local/bin/k3s

- name: Enable k3s service
  systemd:
    name: k3s
    enabled: true
    state: started